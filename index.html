<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#166c5a">
  <title>考公 Brain · 行测错题</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app-shell">
    <main class="view-stack">
      <section class="view is-active" id="view-home" data-view="home">
        <div class="view-title">
          <p class="eyebrow" id="dateLabel"></p>
          <h1>今日</h1>
        </div>
        <div class="metric-grid" id="metricGrid"></div>

        <section class="section-block home-action-section">
          <div class="section-head">
            <h2>今日复习</h2>
            <button class="text-button nav-link-button" id="showDueLibraryBtn" type="button">进入复习 <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m9 18 6-6-6-6"/></svg></button>
          </div>
          <div class="item-list" id="dueList"></div>
        </section>

        <section class="section-block home-action-section">
          <div class="section-head">
            <h2>今日任务</h2>
            <button class="text-button create-button" id="addTaskBtn" type="button"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 5v14M5 12h14"/></svg>新建</button>
          </div>
          <div class="item-list" id="todayTaskList"></div>
        </section>
      </section>

      <section class="view" id="view-library" data-view="library">
        <div class="view-title">
          <p class="eyebrow">复习资料</p>
          <h1>错题库</h1>
        </div>
        <section class="section-block import-entry">
          <div class="section-head">
            <h2>导入错题</h2>
            <button class="chevron-button" id="openImportSheetBtn" type="button" aria-label="打开导入错题"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="m6 9 6 6 6-6"/></svg></button>
          </div>
          <p class="hint-text">粘贴 Claude 内容、图片识别和草稿导入都收在这里。</p>
        </section>

        <section class="section-block draft-entry">
          <button class="draft-entry-button" id="openDraftsBtn" type="button">
            <span id="draftSummary">待保存草稿</span>
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m9 18 6-6-6-6"/></svg>
          </button>
        </section>

        <section class="section-block library-stats-section">
          <div class="section-head compact">
            <h2>板块统计</h2>
          </div>
          <div class="stat-chip-row" id="subjectStats"></div>
        </section>

        <section class="section-block sticky-filter">
          <div class="search-row">
            <input id="searchInput" type="search" placeholder="搜索题目、模块、错因">
            <select id="subjectFilter"></select>
          </div>
          <div class="chip-row" id="subjectChips"></div>
        </section>
        <div class="item-list library-list" id="mistakeList"></div>
      </section>

      <section class="view" id="view-drafts" data-view="drafts">
        <div class="view-title">
          <p class="eyebrow">导入确认</p>
          <h1>待保存草稿</h1>
        </div>
        <section class="section-block">
          <div class="section-head compact">
            <button class="text-button nav-link-button" id="backToLibraryBtn" type="button"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="m15 18-6-6 6-6"/></svg>返回错题库</button>
            <button class="text-button" id="saveDraftsBtn" type="button">全部保存</button>
          </div>
          <div class="draft-list" id="draftList"></div>
        </section>
      </section>

      <section class="view" id="view-plan" data-view="plan">
        <div class="view-title">
          <p class="eyebrow">计划管理</p>
          <h1>学习任务</h1>
        </div>
        <section class="section-block">
          <div class="section-head">
            <h2>任务日历</h2>
            <button class="text-button create-button" id="planAddTaskBtn" type="button"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 5v14M5 12h14"/></svg>新建</button>
          </div>
          <div class="segmented" id="calendarMode">
            <button class="is-active" data-mode="day" type="button">日</button>
            <button data-mode="week" type="button">周</button>
            <button data-mode="month" type="button">月</button>
          </div>
          <div class="calendar-shell" id="calendarShell"></div>
        </section>
      </section>

      <section class="view" id="view-review" data-view="review">
        <div class="view-title">
          <p class="eyebrow">错题复盘</p>
          <h1>复习</h1>
        </div>
        <section class="section-block">
          <div class="section-head">
            <h2>已逾期</h2>
          </div>
          <div class="item-list" id="reviewOverdueList"></div>
        </section>
        <section class="section-block">
          <div class="section-head">
            <h2>今日复习</h2>
          </div>
          <div class="item-list" id="reviewTodayList"></div>
        </section>
      </section>

      <section class="view" id="view-settings" data-view="settings">
        <div class="view-title">
          <p class="eyebrow">偏好与数据</p>
          <h1>设置</h1>
        </div>
        <section class="section-block">
          <h2>目标</h2>
          <div class="setting-row">
            <span class="setting-row-label">每日目标</span>
            <label class="setting-row-value"><input id="dailyTargetInput" type="number" min="20" max="900" step="10"><span class="setting-unit">分钟</span></label>
          </div>
          <button class="primary-button settings-update-button" id="saveSettingsBtn" type="button">保存设置</button>
        </section>

        <details class="section-block settings-detail">
          <summary>AI 接入</summary>
          <label class="field-label">
            API Base URL
            <input id="apiBaseUrlInput" placeholder="https://api.openai.com/v1">
          </label>
          <label class="field-label">
            模型
            <input id="apiModelInput" placeholder="gpt-4o-mini">
          </label>
          <label class="field-label">
            API Key
            <input id="apiKeyInput" type="password" placeholder="留空则不修改">
          </label>
          <div class="button-row ai-test-row">
            <button class="secondary-button" id="testApiBtn" type="button">测试连接</button>
            <span class="api-test-status" id="apiTestStatus"></span>
          </div>
          <p class="hint-text">浏览器直连 API 可能被部分平台拦截；如果失败，先用“整理成草稿”的本地解析。</p>
        </details>

        <section class="section-block">
          <h2>备份</h2>
          <div class="button-row">
            <button class="secondary-button" id="exportBtn" type="button">导出 JSON</button>
            <label class="secondary-button file-label">
              导入 JSON
              <input id="importFileInput" type="file" accept="application/json,.json">
            </label>
          </div>
        </section>
      </section>
    </main>

    <nav class="bottom-nav" aria-label="主导航">
      <button class="is-active" data-nav="home" type="button">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 10.5 12 4l8 6.5V20a1 1 0 0 1-1 1h-5v-6h-4v6H5a1 1 0 0 1-1-1z"/></svg>
        今日
      </button>
      <button data-nav="plan" type="button">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M7 3v4M17 3v4M4 8h16"/><path d="M5 5h14a1 1 0 0 1 1 1v14H4V6a1 1 0 0 1 1-1z"/><path d="M8 12h2M14 12h2M8 16h2M14 16h2"/></svg>
        计划
      </button>
      <button data-nav="library" type="button">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 4h10a3 3 0 0 1 3 3v13H8a3 3 0 0 1-3-3z"/><path d="M8 8h7M8 12h7"/></svg>
        错题
      </button>
      <button data-nav="review" type="button">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 12a9 9 0 0 1 15.3-6.4L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-15.3 6.4L3 16"/><path d="M3 21v-5h5"/></svg>
        复习
      </button>
      <button data-nav="settings" type="button">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 8.5a3.5 3.5 0 1 0 0 7 3.5 3.5 0 0 0 0-7z"/><path d="M19 12a7 7 0 0 0-.1-1.1l2-1.5-2-3.4-2.4 1a7.5 7.5 0 0 0-1.9-1.1L14.2 3h-4.4l-.4 2.9A7.5 7.5 0 0 0 7.5 7L5.1 6l-2 3.4 2 1.5A7 7 0 0 0 5 12c0 .4 0 .8.1 1.1l-2 1.5 2 3.4 2.4-1a7.5 7.5 0 0 0 1.9 1.1l.4 2.9h4.4l.4-2.9a7.5 7.5 0 0 0 1.9-1.1l2.4 1 2-3.4-2-1.5c.1-.3.1-.7.1-1.1z"/></svg>
        设置
      </button>
    </nav>
    <button class="fab-action" id="quickImportBtn" type="button" aria-label="快捷操作">
      <span>＋</span>
    </button>
  </div>

  <div class="sheet-backdrop" id="mistakeSheetBackdrop"></div>
  <aside class="bottom-sheet" id="mistakeSheet" aria-hidden="true">
    <div class="sheet-handle"></div>
    <div class="sheet-body" id="mistakeSheetBody"></div>
  </aside>

  <div class="sheet-backdrop" id="taskSheetBackdrop"></div>
  <aside class="bottom-sheet small" id="taskSheet" aria-hidden="true">
    <div class="sheet-handle"></div>
    <form class="sheet-form" id="taskForm">
      <h2 id="taskFormTitle">新建任务</h2>
      <input id="taskId" type="hidden">
      <label class="field-label">
        任务名称
        <input id="taskTitle" required maxlength="80">
      </label>
      <div class="two-col">
        <label class="field-label">
          日期
          <input id="taskDate" type="date" required>
        </label>
        <label class="field-label">
          分钟
          <input id="taskMinutes" type="number" min="5" max="300" step="5" value="30">
        </label>
      </div>
      <label class="field-label">
        优先级
        <select id="taskPriority">
          <option value="high">高优先</option>
          <option value="medium" selected>中优先</option>
          <option value="low">低优先</option>
        </select>
      </label>
      <label class="field-label">
        备注
        <textarea id="taskNote" rows="3"></textarea>
      </label>
      <div class="button-row">
        <button class="primary-button" type="submit">保存</button>
        <button class="secondary-button" id="taskCancelBtn" type="button">取消</button>
      </div>
    </form>
  </aside>

  <div class="sheet-backdrop" id="importSheetBackdrop"></div>
  <aside class="bottom-sheet small" id="importSheet" aria-hidden="true">
    <div class="sheet-handle"></div>
    <section class="import-panel">
      <div class="section-head">
        <h2>导入错题</h2>
        <button class="text-button" id="sampleBtn" type="button">示例</button>
      </div>
      <textarea id="claudeInput" rows="8" placeholder="粘贴 Claude 总结出的错题卡"></textarea>
      <div class="button-row">
        <button class="primary-button" id="parseBtn" type="button">整理成草稿</button>
        <button class="secondary-button" id="aiParseBtn" type="button">AI 整理</button>
      </div>
      <label class="secondary-button file-label import-file-button">
        图片 AI 识别
        <input id="imageAiInput" type="file" accept="image/*" multiple>
      </label>
      <label class="secondary-button file-label import-file-button">
        仅保存图片到草稿
        <input id="imageAttachInput" type="file" accept="image/*" multiple>
      </label>
      <button class="text-button under-button" id="clearImportBtn" type="button">清空内容</button>
    </section>
  </aside>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script src="app.js"></script>
</body>
</html>
